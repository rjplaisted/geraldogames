<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Bomberos! 🚒 Firetruck Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #4A90E2 40%, #808080 40%, #696969 100%);
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: repeating-linear-gradient(
                90deg,
                #696969 0px,
                #696969 100px,
                #555 100px,
                #555 110px
            );
            z-index: 0;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.8;
            z-index: 0;
        }

        .building {
            position: absolute;
            bottom: 100px;
            width: 250px;
            height: 400px;
            background: #8B7355;
            border: 5px solid #654321;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .building:hover {
            transform: scale(1.05);
        }

        .building::before {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 135px solid transparent;
            border-right: 135px solid transparent;
            border-bottom: 100px solid #8B4513;
        }

        .window {
            position: absolute;
            width: 60px;
            height: 70px;
            background: #FFD700;
            border: 3px solid #333;
        }

        .person {
            position: absolute;
            font-size: 60px;
            z-index: 5;
            animation: wave 0.5s infinite;
            cursor: pointer;
            transition: all 0.5s ease-out;
        }

        .person:hover {
            transform: scale(1.2);
        }

        .bad-person {
            animation: flicker 0.5s infinite !important;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .bad-guy {
            position: absolute;
            font-size: 50px;
            z-index: 5;
        }

        .house-item {
            position: absolute;
            font-size: 40px;
            z-index: 5;
        }

        .car {
            position: absolute;
            font-size: 80px;
            z-index: 6;
            transition: left 3s linear;
        }

        .ambulance {
            position: absolute;
            font-size: 130px;
            z-index: 51;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .injured-person {
            position: absolute;
            font-size: 60px;
            z-index: 52;
            animation: cry 0.5s infinite;
        }

        @keyframes cry {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .sonic {
            position: absolute;
            width: 140px;
            height: 180px;
            z-index: 53;
            transition: all 0.3s ease-out;
            transform: scale(1.4);
        }

        .sonic-body {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Sonic's main head (large blue sphere) */
        .sonic-head {
            position: absolute;
            width: 90px;
            height: 90px;
            background: #0066FF;
            border-radius: 50%;
            bottom: 50px;
            left: 25px;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.3), 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Sonic's iconic spikes - make them BIGGER and more prominent */
        .sonic-spike {
            position: absolute;
            background: #0066FF;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
        }

        .sonic-spike1 {
            width: 35px;
            height: 55px;
            top: -35px;
            left: 5px;
            border-radius: 50% 50% 0 0;
            transform: rotate(-35deg);
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        .sonic-spike2 {
            width: 40px;
            height: 60px;
            top: -40px;
            left: 25px;
            border-radius: 50% 50% 0 0;
            transform: rotate(-10deg);
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        .sonic-spike3 {
            width: 35px;
            height: 55px;
            top: -35px;
            right: 5px;
            border-radius: 50% 50% 0 0;
            transform: rotate(25deg);
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        /* Back spikes */
        .sonic-spike4 {
            width: 30px;
            height: 45px;
            top: 10px;
            right: -15px;
            border-radius: 50% 50% 0 0;
            transform: rotate(75deg);
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        .sonic-spike5 {
            width: 28px;
            height: 40px;
            top: 35px;
            right: -12px;
            border-radius: 50% 50% 0 0;
            transform: rotate(90deg);
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        /* Sonic's face - peach/tan colored muzzle area */
        .sonic-face {
            position: absolute;
            width: 55px;
            height: 45px;
            background: #FFDDAA;
            border-radius: 50%;
            top: 28px;
            left: 18px;
            border: 2px solid #000;
            z-index: 2;
        }

        /* Sonic's connected white eyes (mono-eye style) */
        .sonic-eyes {
            position: absolute;
            width: 62px;
            height: 32px;
            background: white;
            border-radius: 50%;
            top: 15px;
            left: 14px;
            border: 3px solid black;
            z-index: 3;
        }

        .sonic-pupil {
            position: absolute;
            width: 12px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            top: 8px;
        }

        .sonic-pupil-left {
            left: 12px;
        }

        .sonic-pupil-right {
            right: 12px;
        }

        /* White highlights in eyes */
        .sonic-eye-glint {
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 2px;
        }

        /* Sonic's nose */
        .sonic-nose {
            position: absolute;
            width: 12px;
            height: 10px;
            background: #000;
            border-radius: 0 0 50% 50%;
            top: 35px;
            left: 39px;
            z-index: 4;
        }

        /* Sonic's smile */
        .sonic-mouth {
            position: absolute;
            width: 25px;
            height: 12px;
            border: 2px solid black;
            border-top: none;
            border-radius: 0 0 15px 15px;
            top: 48px;
            left: 20px;
            background: #FFB6B6;
        }

        /* Sonic's body/torso (blue) */
        .sonic-torso {
            position: absolute;
            width: 50px;
            height: 42px;
            background: #0066FF;
            border-radius: 50%;
            bottom: 35px;
            left: 45px;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3);
        }

        /* Sonic's belly (peach colored) */
        .sonic-belly {
            position: absolute;
            width: 48px;
            height: 40px;
            background: #FFDDAA;
            border-radius: 50%;
            bottom: 36px;
            left: 46px;
            border: 2px solid #000;
            z-index: 2;
        }

        /* Sonic's arms */
        .sonic-arm {
            position: absolute;
            width: 18px;
            height: 40px;
            background: #0066FF;
            border-radius: 10px;
            bottom: 48px;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
        }

        .sonic-arm-left {
            left: 28px;
            transform: rotate(-25deg);
        }

        .sonic-arm-right {
            right: 28px;
            transform: rotate(25deg);
        }

        /* Sonic's gloves (white) */
        .sonic-glove {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #FFFFFF;
            border-radius: 50%;
            border: 2px solid #000;
            box-shadow: inset -2px -2px 3px rgba(0,0,0,0.2);
        }

        .sonic-glove-left {
            bottom: 43px;
            left: 20px;
        }

        .sonic-glove-right {
            bottom: 43px;
            right: 20px;
        }

        /* Glove cuff */
        .sonic-glove-cuff {
            position: absolute;
            width: 100%;
            height: 8px;
            background: white;
            border: 2px solid #000;
            border-radius: 4px;
            top: 8px;
        }

        /* Sonic's legs (blue) */
        .sonic-leg {
            position: absolute;
            width: 22px;
            height: 38px;
            background: #0066FF;
            border-radius: 12px;
            bottom: 18px;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
        }

        .sonic-leg-left {
            left: 40px;
        }

        .sonic-leg-right {
            left: 78px;
        }

        /* Sonic's iconic red shoes with white stripe and yellow buckle */
        .sonic-shoe {
            position: absolute;
            width: 38px;
            height: 24px;
            background: #E40000;
            border-radius: 45% 45% 20% 20%;
            bottom: 0;
            border: 2px solid #000;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4), 2px 2px 4px rgba(0,0,0,0.3);
        }

        .sonic-shoe-left {
            left: 33px;
        }

        .sonic-shoe-right {
            left: 72px;
        }

        /* White stripe on shoe */
        .sonic-shoe-stripe {
            position: absolute;
            width: 100%;
            height: 8px;
            background: white;
            top: 8px;
            border-radius: 4px;
            border-top: 1px solid #CCC;
            border-bottom: 1px solid #CCC;
        }

        /* Yellow buckle on shoe */
        .sonic-shoe-buckle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFD700;
            border-radius: 2px;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid #CC9900;
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.5);
        }

        /* Shoe sole (white bottom) */
        .sonic-shoe-sole {
            position: absolute;
            width: 42px;
            height: 8px;
            background: #FFFFFF;
            border-radius: 50%;
            bottom: -4px;
            left: -2px;
            border: 2px solid #000;
        }

        /* Sonic running animation */
        @keyframes sonic-run {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1.4); }
            50% { transform: translateY(-5px) rotate(-5deg) scale(1.4); }
        }

        .sonic.running {
            animation: sonic-run 0.2s infinite;
        }

        /* Sonic spin dash animation - COOL! */
        @keyframes sonic-spin {
            0% { transform: rotate(0deg) scale(1.4); }
            100% { transform: rotate(720deg) scale(1.5); }
        }

        .sonic.spinning {
            animation: sonic-spin 0.6s ease-in-out;
            filter: blur(1px);
        }

        /* SUPER SONIC TRANSFORMATION - GOLDEN GLOW! */
        @keyframes super-sonic-glow {
            0%, 100% {
                filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 40px yellow) brightness(1.5);
                transform: scale(1.6);
            }
            50% {
                filter: drop-shadow(0 0 30px gold) drop-shadow(0 0 60px yellow) brightness(1.8);
                transform: scale(1.7);
            }
        }

        .sonic.super-sonic {
            animation: super-sonic-glow 0.5s infinite;
        }

        /* Rainbow ring trail */
        @keyframes ring-orbit {
            0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        .ring-orbit {
            position: absolute;
            font-size: 50px;
            animation: ring-orbit 2s linear infinite;
        }

        /* Screen shake for dramatic effect */
        @keyframes screen-shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, 5px); }
            20% { transform: translate(5px, -5px); }
            30% { transform: translate(-5px, -5px); }
            40% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, 5px); }
            60% { transform: translate(5px, -5px); }
            70% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
            90% { transform: translate(-5px, 5px); }
        }

        .screen-shake {
            animation: screen-shake 0.5s;
        }

        /* Sonic victory pose jump */
        @keyframes sonic-victory-jump {
            0% { transform: translateY(0) scale(1.4); }
            40% { transform: translateY(-100px) scale(1.6) rotate(360deg); }
            60% { transform: translateY(-100px) scale(1.6) rotate(360deg); }
            100% { transform: translateY(0) scale(1.4) rotate(720deg); }
        }

        .sonic.victory {
            animation: sonic-victory-jump 2s ease-in-out;
        }

        /* Lightning bolts around Sonic */
        @keyframes lightning-strike {
            0%, 100% { opacity: 0; }
            10%, 30%, 50% { opacity: 1; }
            20%, 40%, 60% { opacity: 0; }
        }

        .lightning {
            position: absolute;
            font-size: 80px;
            z-index: 1000;
            animation: lightning-strike 0.6s;
        }

        /* Sonic thumbs up pose */
        .sonic-thumbs-up {
            position: absolute;
            font-size: 50px;
            top: 30px;
            right: -40px;
            animation: wave 0.5s infinite;
            z-index: 100;
        }

        /* Speed lines behind Sonic */
        .sonic-speed-lines {
            position: absolute;
            left: -50px;
            top: 40px;
            font-size: 40px;
            opacity: 0.6;
            animation: speed-fade 0.5s infinite;
        }

        @keyframes speed-fade {
            0% { opacity: 0.8; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-30px); }
        }

        .plane {
            position: absolute;
            font-size: 180px;
            z-index: 100;
            transition: all 2s linear;
        }

        .flying-plane {
            position: absolute;
            font-size: 150px;
            z-index: 15;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .flying-plane:hover {
            transform: scale(1.1);
        }

        .parachute {
            position: absolute;
            font-size: 180px;
            z-index: 99;
            animation: float-down 4s ease-in forwards;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .parachute:hover {
            transform: scale(1.1);
        }

        @keyframes float-down {
            0% {
                transform: translateY(0) rotate(-5deg);
            }
            100% {
                transform: translateY(800px) rotate(5deg);
            }
        }

        .water-bomb {
            position: absolute;
            font-size: 100px;
            z-index: 98;
            animation: drop 1.5s ease-in forwards;
        }

        @keyframes drop {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(500px) scale(2);
                opacity: 0.5;
            }
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px 35px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            border: 4px solid #4CAF50;
            font-size: 35px;
            font-weight: bold;
            color: #333;
            z-index: 100;
        }

        #language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #language-toggle:hover {
            background: #45a049;
        }

        #music-toggle {
            position: absolute;
            top: 90px;
            right: 20px;
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #music-toggle:hover {
            background: #FF5252;
        }

        #firetruck {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 150px;
            z-index: 50;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #firetruck.driving {
            animation: none;
            font-size: 170px;
        }

        #firefighter-boy {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            z-index: 51;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .boy-driving {
            font-size: 70px;
        }

        .bad-guy-standalone {
            position: absolute;
            font-size: 150px;
            z-index: 15;
            cursor: pointer;
            animation: bounce 1s infinite;
            filter: drop-shadow(0 8px 16px rgba(255,0,0,0.8));
        }

        .bad-guy-standalone:hover {
            transform: scale(1.15);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        /* Police scene background - bright daylight */
        .police-scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #B0E3FF 50%, #FFD89E 100%);
            z-index: 500;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .police-scene-bg.active {
            opacity: 1;
        }

        /* Bright sun in the sky */
        .sun {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #FFF700 0%, #FFD700 40%, #FFA500 100%);
            border-radius: 50%;
            top: 80px;
            right: 150px;
            box-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500;
            animation: sun-glow 2s infinite;
        }

        @keyframes sun-glow {
            0%, 100% { box-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500; }
            50% { box-shadow: 0 0 60px #FFD700, 0 0 120px #FFA500; }
        }

        /* Ground/street for police scene */
        .police-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #808080 0%, #696969 50%, #555 100%);
            border-top: 8px solid #FFD700;
        }

        /* Road lines */
        .road-line {
            position: absolute;
            width: 150px;
            height: 8px;
            background: #FFD700;
            bottom: 50%;
            border-radius: 4px;
        }

        /* Police officer walking */
        .police-officer {
            position: fixed;
            width: 80px;
            height: 140px;
            z-index: 650;
            transform: scale(1.5);
        }

        .police-hat {
            position: absolute;
            width: 70px;
            height: 25px;
            background: #1A237E;
            border-radius: 15px 15px 0 0;
            top: 0;
            left: 5px;
        }

        .police-hat-badge {
            position: absolute;
            width: 20px;
            height: 15px;
            background: #FFD700;
            border-radius: 50%;
            top: 5px;
            left: 25px;
            border: 2px solid #000;
        }

        .police-head {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #FFDBAC;
            border-radius: 50%;
            top: 25px;
            left: 15px;
            border: 3px solid #000;
        }

        .police-body {
            position: absolute;
            width: 60px;
            height: 55px;
            background: #1E3A8A;
            border-radius: 10px;
            top: 75px;
            left: 10px;
            border: 3px solid #000;
        }

        .police-badge {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #FFD700;
            border-radius: 50%;
            top: 15px;
            left: 21px;
            border: 2px solid #000;
        }

        .police-arm {
            position: absolute;
            width: 18px;
            height: 45px;
            background: #1E3A8A;
            border-radius: 9px;
            top: 80px;
            border: 2px solid #000;
        }

        .police-arm-left {
            left: 5px;
            transform: rotate(-10deg);
        }

        .police-arm-right {
            right: 5px;
            transform: rotate(10deg);
        }

        .police-hand {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #FFDBAC;
            border-radius: 50%;
            bottom: -10px;
            left: -1px;
            border: 2px solid #000;
        }

        .police-leg {
            position: absolute;
            width: 22px;
            height: 35px;
            background: #1A237E;
            border-radius: 5px;
            bottom: 0;
            border: 2px solid #000;
        }

        .police-leg-left {
            left: 15px;
        }

        .police-leg-right {
            right: 15px;
        }

        .police-shoe {
            position: absolute;
            width: 28px;
            height: 15px;
            background: #000;
            border-radius: 5px;
            bottom: -8px;
            left: -3px;
        }

        /* Bad guy with handcuffs */
        .bad-guy-caught {
            position: fixed;
            width: 70px;
            height: 130px;
            z-index: 640;
            transform: scale(1.5);
        }

        /* Bad guy head - regular skin tone */
        .bad-guy-head {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #FFDBAC;
            border-radius: 50%;
            top: 20px;
            left: 10px;
            border: 3px solid #000;
        }

        /* Black villain mask over eyes */
        .bad-guy-mask {
            position: absolute;
            width: 45px;
            height: 18px;
            background: #000;
            border-radius: 10px;
            top: 18px;
            left: 2.5px;
            z-index: 2;
        }

        /* Eye holes in the mask */
        .bad-guy-eyes {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFDBAC;
            border-radius: 50%;
            top: 4px;
            border: 1px solid #000;
        }

        .bad-guy-eye-left {
            left: 8px;
        }

        .bad-guy-eye-right {
            right: 8px;
        }

        /* Evil eyebrows */

    <script>
    /* ── Auto-scaler ─────────────────────────────────────────────────────────
       The game was designed at 1440×900 (MacBook Pro).  This script:
         1. Overrides window.innerWidth/Height so all game JS sees 1440×900
         2. Scales the <body> with CSS transform to fit any viewport
         3. Patches getBoundingClientRect() so hit-test coordinates stay in
            the 1440×900 design space even after the CSS scale is applied
    ──────────────────────────────────────────────────────────────────────── */
    (function () {
        var DW = 1440, DH = 900;   // design resolution
        var _scale = 1;

        // 1. Override window dimensions BEFORE game JS reads them
        Object.defineProperty(window, 'innerWidth',  { get: function () { return DW; }, configurable: true });
        Object.defineProperty(window, 'innerHeight', { get: function () { return DH; }, configurable: true });

        // 2. Patch getBoundingClientRect so returned coords are in design space
        var _origGBCR = Element.prototype.getBoundingClientRect;
        Element.prototype.getBoundingClientRect = function () {
            var r = _origGBCR.call(this);
            if (_scale === 1) return r;
            var s = _scale;
            return {
                left: r.left / s,  right: r.right / s,
                top:  r.top  / s,  bottom: r.bottom / s,
                width: r.width / s, height: r.height / s,
                x: r.x / s,  y: r.y / s,
                toJSON: function () { return this; }
            };
        };

        // 3. Scale body to fill viewport while preserving aspect ratio
        function applyScale() {
            var rw = document.documentElement.clientWidth;
            var rh = document.documentElement.clientHeight;
            _scale = Math.min(rw / DW, rh / DH);
            var ox = Math.max(0, (rw - DW * _scale) / 2);
            var oy = Math.max(0, (rh - DH * _scale) / 2);
            var b = document.body;
            b.style.width          = DW + 'px';
            b.style.height         = DH + 'px';
            b.style.overflow       = 'hidden';
            b.style.position       = 'fixed';
            b.style.transformOrigin = '0 0';
            b.style.transform      = 'scale(' + _scale + ')';
            b.style.left           = ox + 'px';
            b.style.top            = oy + 'px';
            var html = document.documentElement;
            html.style.overflow    = 'hidden';
            html.style.background  = '#1a1a2e';   // letterbox colour
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', applyScale);
        } else {
            applyScale();
        }
        window.addEventListener('resize', applyScale);
        window.addEventListener('orientationchange', function () { setTimeout(applyScale, 300); });
    })();
    </script>

        // Sound effects using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playWaterSound() {
            // Make a loud water spray sound
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sawtooth';
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.5);

            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function playCelebrationSound() {
            // Happy celebration sound
            [0, 0.15, 0.3].forEach((delay, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'sine';
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                const freq = 400 + (index * 200);
                oscillator.frequency.setValueAtTime(freq, audioContext.currentTime + delay);

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + delay);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + delay + 0.3);

                oscillator.start(audioContext.currentTime + delay);
                oscillator.stop(audioContext.currentTime + delay + 0.3);
            });
        }

        function speak(text, lang) {

            utterance.rate = 0.7;
            utterance.pitch = 1.2;
            speechSynthesis.speak(utterance);

        function playTriumphantMusic() {
            // Victory fanfare!
            const victoryNotes = [
                { freq: 523, duration: 0.2 }, // C
                { freq: 659, duration: 0.2 }, // E
                { freq: 784, duration: 0.2 }, // G
                { freq: 1047, duration: 0.4 }, // High C
                { freq: 784, duration: 0.2 }, // G
                { freq: 1047, duration: 0.6 }, // High C (hold)
            ];

            let currentTime = audioContext.currentTime;

            victoryNotes.forEach((note) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'sine';
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.setValueAtTime(note.freq, currentTime);
                gainNode.gain.setValueAtTime(0.25, currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + note.duration);

                oscillator.start(currentTime);
                oscillator.stop(currentTime + note.duration);

                currentTime += note.duration;
            });
        }

        function playSirenSound() {
            // Realistic firetruck siren - smooth sweep WEE-OOO-WEE-OOO!
            for (let i = 0; i < 2; i++) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'sine';
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                const startTime = audioContext.currentTime + (i * 0.6);

                // Sweep up
                oscillator.frequency.setValueAtTime(600, startTime);
                oscillator.frequency.linearRampToValueAtTime(1000, startTime + 0.3);
                // Sweep down
                oscillator.frequency.linearRampToValueAtTime(600, startTime + 0.6);

                gainNode.gain.setValueAtTime(0.4, startTime);
                gainNode.gain.setValueAtTime(0.4, startTime + 0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.6);

                oscillator.start(startTime);
                oscillator.stop(startTime + 0.6);
            }
        }

        function playAmbulanceSiren() {
            // Different ambulance siren - two tone NEE-NAW-NEE-NAW!
            for (let i = 0; i < 3; i++) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'square';
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                const startTime = audioContext.currentTime + (i * 0.4);

                // Fast alternating tones
                oscillator.frequency.setValueAtTime(800, startTime);
                oscillator.frequency.setValueAtTime(650, startTime + 0.2);

                gainNode.gain.setValueAtTime(0.35, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);

                oscillator.start(startTime);
                oscillator.stop(startTime + 0.4);
            }
        }

        function playPlaneSound() {
            // Airplane engine rumble - VRRRROOOOOMMMM
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sawtooth';
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.setValueAtTime(120, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(150, audioContext.currentTime + 1);
            oscillator.frequency.linearRampToValueAtTime(100, audioContext.currentTime + 2);

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.35, audioContext.currentTime + 1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 2);
        }

        function playJailDoorSlam() {
            // LOUD METAL DOOR SLAM - CLANG!!!
            // Create multiple sounds for realism

            // Main slam impact
            const noise = audioContext.createOscillator();
            const noiseGain = audioContext.createGain();
            noise.type = 'square';
            noise.connect(noiseGain);
            noiseGain.connect(audioContext.destination);

            noise.frequency.setValueAtTime(80, audioContext.currentTime);
            noise.frequency.exponentialRampToValueAtTime(40, audioContext.currentTime + 0.1);

            noiseGain.gain.setValueAtTime(0.6, audioContext.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            noise.start(audioContext.currentTime);
            noise.stop(audioContext.currentTime + 0.3);

            // Metal clang resonance
            setTimeout(() => {
                const clang = audioContext.createOscillator();
                const clangGain = audioContext.createGain();
                clang.type = 'triangle';
                clang.connect(clangGain);
                clangGain.connect(audioContext.destination);

                clang.frequency.setValueAtTime(300, audioContext.currentTime);
                clang.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.4);

                clangGain.gain.setValueAtTime(0.5, audioContext.currentTime);
                clangGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);

                clang.start(audioContext.currentTime);
                clang.stop(audioContext.currentTime + 0.4);
            }, 50);

            // Echo/reverb
            setTimeout(() => {
                const echo = audioContext.createOscillator();
                const echoGain = audioContext.createGain();
                echo.type = 'sine';
                echo.connect(echoGain);
                echoGain.connect(audioContext.destination);

                echo.frequency.setValueAtTime(200, audioContext.currentTime);
                echoGain.gain.setValueAtTime(0.2, audioContext.currentTime);
                echoGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.6);

                echo.start(audioContext.currentTime);
                echo.stop(audioContext.currentTime + 0.6);
            }, 100);
        }

        function playSonicSound() {
            // Sonic's signature "RING!" collection sound - bright and happy
            const ringSound = [

        function stopBackgroundMusic() {
            musicPlaying = false;

        function playBackgroundMusic() {
            if (musicPlaying || !musicEnabled || !gameActive) return;
            musicPlaying = true;

            let currentTime = audioContext.currentTime;

            musicNotes.forEach((note) => {
                if (note.freq > 0) {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();

                    oscillator.type = 'square';
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.frequency.setValueAtTime(note.freq, currentTime);
                    gainNode.gain.setValueAtTime(0.08, currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + note.duration);

                    oscillator.start(currentTime);
                    oscillator.stop(currentTime + note.duration);
                }
                currentTime += note.duration;
            });

            // Loop the music
            musicTimeout = setTimeout(() => {
                musicPlaying = false;
                if (musicEnabled && gameActive) {
                    playBackgroundMusic();
                }
            }, currentTime * 1000 - audioContext.currentTime * 1000 + 500);
        }

        }

        // Start music on first click
        document.addEventListener('click', function startMusic() {
            playBackgroundMusic();
            document.removeEventListener('click', startMusic);
        }, { once: true });

        // Start the game - small delay to ensure DOM is ready
        setTimeout(() => {
            createFire();
        }, 500);
    </script>
</body>
</html>
