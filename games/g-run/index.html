              x: b.x + b.width / 2, y: b.y - 15,
              text: '+25', color: '#FFB300', life: 60,
            });
            b.y -= 8;
            setTimeout(() => { if (b) b.y += 8; }, 100);
          } else if (b.type === 'brick') {
            spawnBrickDebris(b.x, b.y, b.width, b.height);
            score += 15;
            scoreDisplay.textContent = score;
            playBreakSound();
            floatingTexts.push({
              x: b.x + b.width / 2, y: b.y - 15,
              text: '+15', color: '#A1887F', life: 60,
            });
            blocks.splice(i, 1);
          }
          player.vy = 2;
          continue;
        }

        // --- LAND ON TOP ---
        if (
          player.vy >= 0 &&
          px + pw > b.x + 4 && px < b.x + b.width - 4 &&
          player.y + player.height >= b.y &&
          player.y + player.height <= b.y + b.height / 2 + player.vy + 2
        ) {
          player.y = b.y - player.height;
          player.vy = 0;
          player.grounded = true;
          player.jumpsLeft = player.maxJumps;
          player.isFlipping = false;
          player.flipAngle = 0;
          continue;
        }

        // --- RUN INTO FROM SIDE ---
        if (
          player.vy >= -2 &&
          px + pw > b.x && px + pw < b.x + b.width / 2 + 10 &&
          py + ph > b.y + 8 && py < b.y + b.height - 8
        ) {
          knockBlockOver(b, 1);
          blocks.splice(i, 1);
          continue;
        }
      }
    }

    // ===== KNOCK PIPE OVER =====
    function knockPipeOver(p) {
      knockedPipes.push({
        x: p.x, y: p.y,
        width: p.width, height: p.height,
        vx: 5 + Math.random() * 3,
        vy: -4 - Math.random() * 3,
        angle: 0,
        spin: 0.06 + Math.random() * 0.08,
        gravity: 0.45,
        life: 100,
      });
      playBreakSound();
      floatingTexts.push({
        x: p.x + p.width / 2, y: p.y - 15,
        text: 'CRASH!', color: '#43A047', life: 50,
      });
    }

    // ===== DRAW: KNOCKED PIPES =====
    function drawKnockedPipes() {
      knockedPipes.forEach(kp => {
        ctx.save();
        ctx.translate(kp.x + kp.width / 2, kp.y + kp.height / 2);
        ctx.rotate(kp.angle);
        ctx.globalAlpha = Math.max(0, kp.life / 60);
        // Pipe body
        ctx.fillStyle = '#2E7D32';
        ctx.fillRect(-kp.width / 2 + 5, -kp.height / 2 + 20, kp.width - 10, kp.height - 20);
        // Pipe rim
        ctx.fillStyle = '#43A047';
        ctx.fillRect(-kp.width / 2, -kp.height / 2, kp.width, 24);
        ctx.globalAlpha = 1;
        ctx.restore();
      });
    }

    // ===== COLLISION: PIPES (land on top + side knockover) =====
    function checkPipeLanding() {
      const px = player.x + 15;
      const py = player.y + 10;
      const pw = player.width - 30;
      const ph = player.height - 15;

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];

        // --- LAND ON TOP ---
        if (
          player.vy >= 0 &&
          px + pw > p.x + 4 && px < p.x + p.width - 4 &&
          player.y + player.height >= p.y &&
          player.y + player.height <= p.y + 20 + player.vy + 2
        ) {
          player.y = p.y - player.height;
          player.vy = 0;
          player.grounded = true;
          player.jumpsLeft = player.maxJumps;
          player.isFlipping = false;
          player.flipAngle = 0;
          continue;
        }

        // --- RUN INTO PIPE FROM SIDE (knock it over, slow player) ---
        if (
          px + pw > p.x && px + pw < p.x + p.width / 2 + 10 &&
          py + ph > p.y + 8 && py < p.y + p.height
        ) {
          knockPipeOver(p);
          pipes.splice(i, 1);
          // Slow the player for ~1 second
          player.slowTimer = 60;
          continue;
        }
      }
    }

    // ===== COLLISION: SHARKS =====
    function checkSharkCollision() {
      const px = player.x + 15;
      const py = player.y + 10;
      const pw = player.width - 30;
      const ph = player.height - 15;

      for (let i = sharks.length - 1; i >= 0; i--) {
        const s = sharks[i];
        if (s.dead) continue;

        // Check overlap
        if (
          px < s.x + s.width &&
          px + pw > s.x &&
          py < s.y + s.height &&
          py + ph > s.y
        ) {
          // Landing on top of shark (stomping)
          if (
            player.vy > 0 &&
            py + ph < s.y + s.height / 2 + 10
          ) {
            // Stomp the shark!
            s.dead = true;
            player.vy = -10; // bounce up
            player.grounded = false;
            score += 50;
            scoreDisplay.textContent = score;
            playStompSound();
            floatingTexts.push({
              x: s.x + s.width / 2, y: s.y - 15,
              text: '+50 STOMP!', color: '#FF5722', life: 70,
            });
            // Splash particles
            for (let j = 0; j < 6; j++) {
              debris.push({
                x: s.x + Math.random() * s.width,
                y: s.y,
                vx: (Math.random() - 0.5) * 6,
                vy: -3 - Math.random() * 6,
                size: 4 + Math.random() * 4,
                angle: 0,
                spin: (Math.random() - 0.5) * 0.2,
                gravity: 0.3,
                color: '#2196F3',
                life: 40,
              });
            }
          } else if (player.invincibleTimer <= 0) {
            // Side collision - take damage
            damagePlayer();
          }
        }
      }
    }

    function damagePlayer() {
      player.invincibleTimer = 120; // 2 seconds invincibility
      player.flashTimer = 120;
      score = Math.max(0, score - 20);
      scoreDisplay.textContent = score;
      playHurtSound();
      floatingTexts.push({
        x: player.x + player.width / 2, y: player.y - 20,
        text: 'OUCH! -20', color: '#FF1744', life: 60,
      });
    }

    // ===== COLLISION: TORNADO =====
    function checkTornadoLaunch() {
      const px = player.x + 15;
      const py = player.y + 10;
      const pw = player.width - 30;
      const ph = player.height - 15;

      tornados.forEach(t => {
        if (
          px < t.x + t.width + 10 &&
          px + pw > t.x - 10 &&
          py < t.y + t.height &&
          py + ph > t.y
        ) {
          player.vy = -28;
          player.grounded = false;
          player.jumpsLeft = player.maxJumps; // reset jumps from tornado
          floatingTexts.push({
            x: player.x + player.width / 2, y: player.y - 20,
            text: 'WHOOSH!', color: '#90A4AE', life: 50,
          });
        }
      });
    }

    // ===== UPDATE ALL WORLD OBJECTS =====
    function updateWorld() {
      const moveItems = (arr) => {
        arr.forEach(item => item.x -= gameSpeed);
      };
      moveItems(pipes);
      moveItems(blocks);
      moveItems(coins);
      moveItems(scenery);
      moveItems(waterZones);
      moveItems(tornados);
      moveItems(doritos);
      moveItems(letterItems);

      // Update letter prompt/celebrate timers
      if (letterPromptTimer > 0) letterPromptTimer--;
      if (letterCelebrateTimer > 0) letterCelebrateTimer--;

      // Move sharks (track their water zone)
      sharks.forEach(s => {
        s.x -= gameSpeed;
        s.waterX -= gameSpeed;

        // Shark jumping behavior
        if (!s.dead) {
          s.jumpTimer--;
          if (s.jumpTimer <= 0 && !s.jumping) {
            // Start jump when player is nearby
            if (Math.abs(player.x - s.x) < 300) {
              s.jumping = true;
              s.vy = -12 - Math.random() * 6;
            }
            s.jumpTimer = 60 + Math.floor(Math.random() * 90);
          }

          if (s.jumping) {
            s.vy += 0.4;
            s.y += s.vy;
            if (s.y >= s.baseY) {
              s.y = s.baseY;
              s.vy = 0;
              s.jumping = false;
            }
          }
        }
      });

      // Mountains parallax
      mountains.forEach(m => {
        m.x -= gameSpeed * 0.15;
        if (m.x + m.w < 0) {
          m.x = GAME_W + Math.random() * 100;
          m.w = 250 + Math.random() * 200;
          m.h = 80 + Math.random() * 60;
        }
      });

      // Clouds
      clouds.forEach(c => {
        c.x -= c.speed + gameSpeed * 0.1;
        if (c.x + c.w < 0) {
          c.x = GAME_W + c.w;
          c.y = 20 + Math.random() * 80;
        }
      });

      // Remove off-screen objects
      pipes = pipes.filter(p => p.x + p.width > -60);
      blocks = blocks.filter(b => b.x + b.width > -60);
      coins = coins.filter(c => c.x + c.width > -60);
      scenery = scenery.filter(s => s.x + s.width > -60);
      waterZones = waterZones.filter(w => w.x + w.width > -60);
      tornados = tornados.filter(t => t.x + t.width > -60);
      sharks = sharks.filter(s => s.x + s.width > -60);
      doritos = doritos.filter(d => d.x + d.width > -60);
      // Note: letterItems are handled by checkLetterMiss, not filtered here

      // Update floating texts
      floatingTexts.forEach(ft => {
        ft.y -= 1.5;
        ft.life--;
      });
      floatingTexts = floatingTexts.filter(ft => ft.life > 0);

      // Update debris
      debris.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        d.vy += d.gravity;
        d.angle += d.spin;
        d.life--;
      });
      debris = debris.filter(d => d.life > 0);

      // Update knocked blocks
      knockedBlocks.forEach(kb => {
        kb.x += kb.vx;
        kb.y += kb.vy;
        kb.vy += kb.gravity;
        kb.angle += kb.spin;
        kb.life--;
      });
      knockedBlocks = knockedBlocks.filter(kb => kb.life > 0);

      // Update knocked pipes
      knockedPipes.forEach(kp => {
        kp.x += kp.vx;
        kp.y += kp.vy;
        kp.vy += kp.gravity;
        kp.angle += kp.spin;
        kp.life--;
      });
      knockedPipes = knockedPipes.filter(kp => kp.life > 0);

      // Distance score
      distanceTraveled += gameSpeed;
      if (Math.floor(distanceTraveled) % 100 === 0 && distanceTraveled > 0) {
        score++;
        scoreDisplay.textContent = score;
      }

      // Gradually speed up (only if not powered)
      if (!player.powered && frameCount % 500 === 0 && gameSpeed < 8) {
        gameSpeed += 0.2;
      }
    }

    // ===== PLAYER =====
    function drawPlayer() {
      ctx.save();

      // Damage flash
      if (player.flashTimer > 0) {
        if (Math.floor(player.flashTimer / 4) % 2 === 0) {
          ctx.globalAlpha = 0.3;
        }
      }

      // Power-up glow
      if (player.powered) {
        ctx.shadowColor = '#FF6F00';
        ctx.shadowBlur = 15 + Math.sin(frameCount * 0.2) * 5;
      }

      // Double-jump flip
      if (player.isFlipping) {
        ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
        ctx.rotate(player.flipAngle);
        drawSpriteFrame(player.currentFrame, -player.width / 2, -player.height / 2, player.width, player.height);
      } else {
        drawSpriteFrame(player.currentFrame, player.x, player.y, player.width, player.height);
      }

      ctx.restore();
    }

    function updatePlayer() {
      player.animTimer++;
      const speed = player.powered ? Math.max(1, player.animSpeed - 1) : player.animSpeed;
      if (player.animTimer % speed === 0) {
        player.currentFrame++;
        if (player.currentFrame > 26) player.currentFrame = 0;
      }

      // Invincibility timer
      if (player.invincibleTimer > 0) player.invincibleTimer--;
      if (player.flashTimer > 0) player.flashTimer--;

      // Slow timer (from pipe collision)
      if (player.slowTimer > 0) {
        player.slowTimer--;
        if (!player.powered) {
          gameSpeed = BASE_SPEED * 0.4; // slow to 40% speed
        }
        if (player.slowTimer === 0 && !player.powered) {
          gameSpeed = BASE_SPEED + (difficulty - 1) * 0.4; // restore normal speed
        }
      }

      // Power-up timer
      updatePowerUp();

      // Flip animation
      if (player.isFlipping) {
        player.flipAngle += 0.25;
        if (player.flipAngle >= Math.PI * 2) {
          player.flipAngle = 0;
          player.isFlipping = false;
        }
      }

      // If grounded but not on actual ground, check if still on a platform
      if (player.grounded && player.y < GROUND_LEVEL) {
        let onPlatform = false;
        const px = player.x + 15;
        const pw = player.width - 30;
        const feet = player.y + player.height;

        for (const b of blocks) {
          if (px + pw > b.x + 4 && px < b.x + b.width - 4 &&
              Math.abs(feet - b.y) < 4) {
            onPlatform = true;
            break;
          }
        }
        if (!onPlatform) {
          for (const p of pipes) {
            if (px + pw > p.x + 4 && px < p.x + p.width - 4 &&
                Math.abs(feet - p.y) < 4) {
              onPlatform = true;
              break;
            }
          }
        }
        if (!onPlatform) {
          player.grounded = false;
        }
      }

      if (!player.grounded) {
        player.vy += player.gravity;
        player.y += player.vy;
        if (player.y >= GROUND_LEVEL) {
          player.y = GROUND_LEVEL;
          player.vy = 0;
          player.grounded = true;
          player.jumpsLeft = player.maxJumps;
          player.isFlipping = false;
          player.flipAngle = 0;
        }
      }
    }

    function dismissCutscene() {
      if (cutsceneActive && cutsceneWaiting) {
        cutsceneActive = false;
        cutsceneWaiting = false;
        cutsceneParticles = [];
        // If all letters collected, start finale!
        if (currentLetterIndex >= 26) {
          startFinale();
        }
        return true;
      }
      return false;
    }

    function jump() {
      if (gameState !== 'playing') return;
      if (finaleActive) return;
      if (cutsceneActive) {
        dismissCutscene();
        return;
      }

      if (player.grounded) {
        // First jump
        player.vy = player.jumpForce;
        player.grounded = false;
        player.jumpsLeft = player.maxJumps - 1;
        playJumpSound();
      } else if (player.jumpsLeft > 0) {
        // Double jump with flip!
        player.vy = player.jumpForce * 0.85;
        player.jumpsLeft--;
        player.isFlipping = true;
        player.flipAngle = 0;
        playDoubleJumpSound();
      }
    }

    // ===== GAME CONTROL =====
    function startGame() {
      gameState = 'playing';
      score = 0;
      coinCount = 0;
      distanceTraveled = 0;
      scoreDisplay.textContent = '0';
      coinDisplay.textContent = '0';
      gameSpeed = BASE_SPEED;
      frameCount = 0;
      spawnTimer = 0;
      difficulty = 1;
      pipes = [];
      blocks = [];
      coins = [];
      scenery = [];
      waterZones = [];
      tornados = [];
      floatingTexts = [];
      debris = [];
      knockedBlocks = [];
      knockedPipes = [];
      sharks = [];
      doritos = [];
      letterItems = [];
      currentLetterIndex = 0;
      collectedLetters = new Set();
      letterSpawnCooldown = 60;
      letterPromptText = '';
      letterPromptTimer = 0;
      letterCelebrateText = '';
      letterCelebrateTimer = 0;
      cutsceneActive = false;
      cutsceneWaiting = false;
      cutsceneLetter = '';
      cutsceneTimer = 0;
      cutsceneParticles = [];
      cutsceneFlashAlpha = 0;
      finaleActive = false;
      finalePhase = 0;
      finaleTimer = 0;
      finaleRestartBtn = null;
      finaleDoritos = [];
      finaleLetters = [];
      finaleStars = [];
      finaleParticles = [];
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      player.y = GROUND_LEVEL;
      player.vy = 0;
      player.grounded = true;
      player.currentFrame = 0;
      player.animTimer = 0;
      player.jumpsLeft = player.maxJumps;
      player.isFlipping = false;
      player.flipAngle = 0;
      player.invincibleTimer = 0;
      player.flashTimer = 0;
      player.powered = false;
      player.powerTimer = 0;
      player.jumpForce = player.baseJumpForce;
      player.slowTimer = 0;
      overlay.classList.add('hidden');
      ensureAudioCtx();
    }

    // ===== FRAME RATE NORMALIZATION =====
    // Cap game logic at 60fps so high-refresh-rate devices (e.g. iPad 120Hz) don't run too fast
    const TARGET_FPS = 60;
    const FRAME_DURATION = 1000 / TARGET_FPS;
    let lastFrameTime = 0;
    let accumulator = 0;

    // ===== MAIN LOOP =====
    function gameLoop(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      const elapsed = timestamp - lastFrameTime;
      lastFrameTime = timestamp;
      // Clamp elapsed to avoid spiral of death after tab-away
      accumulator += Math.min(elapsed, 200);

      // Only run game logic at ~60fps ticks
      let ticked = false;
      while (accumulator >= FRAME_DURATION) {
        accumulator -= FRAME_DURATION;
        ticked = true;
        gameTick();
      }

      // Always render (smooth on high-Hz displays)
      ctx.clearRect(0, 0, GAME_W, GAME_H);
      gameRender();

      requestAnimationFrame(gameLoop);
    }

    function gameTick() {
      if (gameState === 'playing') {
        frameCount++;

        if (finaleActive) {
          updateFinale();
        } else if (cutsceneActive) {
          updateCutscene();
        } else {
          groundOffset += gameSpeed;
          spawnStuff();
          updateWorld();
          updatePlayer();
          checkCoinCollect();
          checkLetterCollect();
          checkLetterMiss();
          checkDoritoCollect();
          checkBlockHit();
          checkPipeLanding();
          checkSharkCollision();
          checkTornadoLaunch();
        }
      }
    }

    function gameRender() {
      drawSky();
      drawMountains();
      drawClouds();

      // Draw water behind ground
      waterZones.forEach(w => drawWater(w));
      drawGround();

      // Draw scenery
      scenery.forEach(s => {
        if (s.type === 'flower') drawFlower(s);
      });

      // Draw pipes
      pipes.forEach(p => drawPipe(p));

      // Draw blocks
      blocks.forEach(b => drawBlock(b));

      // Draw coins
      coins.forEach(c => drawCoin(c));

      // Draw doritos
      doritos.forEach(d => drawDorito(d));

      // Draw letter items
      letterItems.forEach(l => drawLetterItem(l));

      // Draw tornados
      tornados.forEach(t => drawTornado(t));

      // Draw sharks
      sharks.forEach(s => drawShark(s));

      // Draw debris
      drawDebris();

      // Draw knocked blocks
      drawKnockedBlocks();

      // Draw knocked pipes
      drawKnockedPipes();

      // Draw player
      drawPlayer();

      // Draw power-up indicator
      drawPowerIndicator();

      // Draw floating texts
      drawFloatingTexts();

      // Draw cutscene overlay (on top of game world)
      if (cutsceneActive) {
        drawCutscene();
      }

      // Draw finale overlay (on top of everything)
      if (finaleActive) {
        drawFinale();
      }

      // Draw alphabet bar on top of everything (not during finale)
      if (!finaleActive) {
        drawAlphabetBar();
      }

      // Draw letter prompts (not during cutscene)
      if (!cutsceneActive) {
        drawLetterPrompt();
      }
    }

    // ===== INPUT =====
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      // Check for finale restart button click
      if (finaleActive && finalePhase === 4) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        if (handleFinaleClick(cx, cy)) return;
      }
      jump();
    });

    playBtn.addEventListener('click', e => {
      e.stopPropagation();
      startGame();
    });

    // ===== INIT =====
    function initSheet() {
      sheetWidth = spriteSheet.naturalWidth;
      sheetHeight = spriteSheet.naturalHeight;
      frameWidth = sheetWidth / COLS;
      frameHeight = sheetHeight / ROWS;
      requestAnimationFrame(gameLoop);
    }

    spriteSheet.onload = initSheet;
    if (spriteSheet.complete && spriteSheet.naturalWidth > 0) initSheet();
  </script>
</body>
</html>
