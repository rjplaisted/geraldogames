name: 🚀 Deploy to geraldo.games

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          DEPLOY_PASS: ${{ secrets.DEPLOY_PASS }}
        run: |
          if [ -z "$DEPLOY_PASS" ]; then
            echo "❌ DEPLOY_PASS secret is not set"
            exit 1
          fi
          LFTP_CMDS="set sftp:auto-confirm yes; set sftp:connect-program 'ssh -o StrictHostKeyChecking=no'; set net:max-retries 3; set net:timeout 30; mirror -R --parallel=4 public/ /home/geraldog/public_html/; mirror -R --parallel=4 games/ /home/geraldog/public_html/games/; mirror -R --parallel=4 api/ /home/geraldog/public_html/api/; bye"
          lftp -u "geraldog,$DEPLOY_PASS" sftp://webserver4.pebblehost.com -e "$LFTP_CMDS"

      - name: ✅ Deploy complete
        run: echo "Site updated at http://geraldo.games"
